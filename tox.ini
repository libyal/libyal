[tox]
envlist = py3{10,11,12,13,14},black,docformatter,pylint,wheel,yamllint

[testenv]
allowlist_externals = ./run_tests.py
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  wheel:
    build
    setuptools >= 65
    wheel
commands =
  py3{10,11,12,13,14}: ./run_tests.py
  wheel: python -m build --no-isolation --wheel

[testenv:black]
skipsdist = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  black
  setuptools >= 65
commands =
  black --version
  black .

[testenv:docformatter]
skipsdist = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  docformatter
  setuptools >= 65
commands =
  docformatter --version
  docformatter --in-place --recursive yaldevtools tests

[testenv:pylint]
skipsdist = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  pylint >= 3.3.0, < 3.4.0
  setuptools >= 65
commands =
  pylint --version
  pylint --rcfile=.pylintrc yaldevtools tests

[testenv:yamllint]
skipsdist = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  setuptools >= 65
  yamllint >= 1.26.0
commands =
  yamllint -v
  yamllint -c .yamllint.yaml data test_data
