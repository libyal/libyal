# yaldevtools generator specification.
---
identifier: generate_build_end
type: template
file: build_linux.yml/build-end.yml
placeholders:
- dpkg_build_dependencies
---
identifier: generate_build_mingw
type: template
file: build_linux.yml/build_mingw.yml
placeholders:
- dpkg_build_dependencies
---
identifier: generate_build_python_module
type: template
condition: "'python_bindings' in project_features"
file: build_linux.yml/build_python.yml
placeholders:
- dpkg_build_dependencies
---
identifier: generate_build_start
type: template
file: build_linux.yml/build-start.yml
---
identifier: generate_build_with_fuse
type: template
condition: "'fuse' in tools_build_dependencies"
file: build_linux.yml/build_fuse.yml
placeholders:
- dpkg_build_dependencies
---
identifier: generate_build_with_static_executables
type: template
condition: "'tools' in project_features"
file: build_linux.yml/build-static_executables.yml
---
identifier: generate_build_with_openssl
type: template
condition: "'crypto' in library_build_dependencies"
file: build_linux.yml/build-openssl.yml
---
identifier: generate_build_with_wide_character_type
type: template
condition: "'wide_character_type' in library_features"
file: build_linux.yml/build-wide_character_type.yml
---
identifier: generate_build_with_zlib
type: template
condition: "'zlib' in library_build_dependencies"
file: build_linux.yml/build-zlib.yml
---
identifier: generate_build_without_pthread
type: template
condition: "'pthread' in library_features"
file: build_linux.yml/build-no_pthread.yml
---
identifier: generate_header
type: template
file: build_linux.yml/header.yml
---
identifier: generate_shared
type: group
operations:
- generate_shared_header
- generate_shared_matrix_wide_character
- generate_shared_footer
---
identifier: generate_shared_footer
type: template
file: build_linux.yml/build_shared-footer.yml
placeholders:
- dpkg_build_dependencies
---
identifier: generate_shared_header
type: template
file: build_linux.yml/build_shared-header.yml
---
identifier: generate_shared_matrix_wide_character
type: template
condition: "'wide_character_type' in library_features"
file: build_linux.yml/build_shared-matrix_wide_character.yml
---
identifier: main
type: group
operations:
- generate_header
- generate_build_start
- generate_build_without_pthread
- generate_build_with_wide_character_type
- generate_build_with_zlib
- generate_build_with_openssl
- generate_build_with_static_executables
- generate_build_end
- generate_build_with_fuse
- generate_build_mingw
- generate_build_python_module
- generate_shared
