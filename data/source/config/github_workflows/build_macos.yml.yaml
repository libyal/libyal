# yaldevtools generator specification.
---
identifier: generate_build
type: template
file: build_macos.yml/build.yml
---
identifier: generate_build_pkgbuild
type: template
file: build_macos.yml/build_pkgbuild.yml
---
identifier: generate_build_python_module
type: template
condition: "'python_bindings' in project_features"
file: build_macos.yml/build_python.yml
---
identifier: main
type: group
operations:
- generate_build
- generate_build_python_module
- generate_build_pkgbuild
