  build_fuse_ubuntu:
    runs-on: $${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: ubuntu-24.04
          compiler: 'gcc'
          configure_options: ''
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        sudo apt -y install ${dpkg_build_dependencies} libfuse-dev
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      env:
        CC: $${{ matrix.compiler }}
      run: |
        tests/build.sh $${{ matrix.configure_options }}
    - name: Run tests
      run: |
        tests/runtests.sh
