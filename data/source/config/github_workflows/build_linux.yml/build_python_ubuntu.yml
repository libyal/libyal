  build_python_ubuntu:
    runs-on: $${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: ubuntu-24.04
          compiler: 'gcc'
          configure_options: '--enable-python'
          python_version: ''
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        sudo add-apt-repository universe &&
        sudo apt update &&
        sudo apt -y install ${dpkg_build_dependencies} python3-dev
    - name: Download test data
      run: |
        if test -x "synctestdata.sh"; then ./synctestdata.sh; fi
    - name: Build from source
      env:
        CC: $${{ matrix.compiler }}
      run: |
        tests/build.sh $${{ matrix.configure_options }}
    - name: Run tests
      env:
        PYTHON_VERSION: $${{ matrix.python_version }}
      run: |
        tests/runtests.sh
  build_pyproject_ubuntu:
    runs-on: $${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: ubuntu-24.04
          compiler: 'gcc'
          configure_options: ''
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        sudo add-apt-repository universe &&
        sudo apt update &&
        sudo apt -y install ${dpkg_build_dependencies} python3 python3-build python3-dev
    - name: Build from source
      env:
        CC: $${{ matrix.compiler }}
      run: |
        tests/build.sh $${{ matrix.configure_options }}
    - name: Build Python module
      run: |
        python -m build
