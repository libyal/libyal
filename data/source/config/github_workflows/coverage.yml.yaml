# yaldevtools generator specification.
---
identifier: generate_coverage_cygwin
type: template
file: coverage.yml/coverage_cygwin.yml
placeholders:
- cygwin_build_dependencies
- coverage_cygwin_configure_options
---
identifier: generate_coverage_linux
type: template
file: coverage.yml/coverage_linux.yml
placeholders:
- coverage_linux_configure_options
- dpkg_build_dependencies
---
identifier: generate_coverage_msys2_mingw
type: template
file: coverage.yml/coverage_msys2_mingw.yml
placeholders:
- msys2_mingw_build_dependencies
- coverage_msys2_mingw_configure_options
---
identifier: generate_header
type: template
file: coverage.yml/header.yml
---
identifier: main
type: group
operations:
- generate_header
- generate_coverage_cygwin
- generate_coverage_linux
- generate_coverage_msys2_mingw
