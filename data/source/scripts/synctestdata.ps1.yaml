# yaldevtools generator specification.
---
identifier: generate_body
type: template
file: synctestdata.ps1/body.ps1
placeholders:
- test_data_files
- test_data_repository
- test_data_path
---
identifier: generate_header
type: template
file: synctestdata.ps1/header.ps1
---
identifier: generate_test_files
type: template
condition: "test_data_files != ''"
file: synctestdata.ps1/test_files.ps1
placeholders:
- test_data_files
---
identifier: generate_test_profiles
type: sequence
input: test_profiles
placeholder: test_profile
operations:
- generate_test_profile_start
- generate_test_profile_glob
- generate_test_profile_options
- generate_test_profile_end
---
identifier: generate_test_profile_end
type: template
file: synctestdata.ps1/test_profile-end.ps1
---
identifier: generate_test_profile_glob
type: template
condition: "test_profile.glob != '*'"
file: synctestdata.ps1/test_profile-glob.ps1
placeholders:
- test_profile
---
identifier: generate_test_profile_options
type: template
condition: "test_profile.options != ''"
file: synctestdata.ps1/test_profile-options.ps1
placeholders:
- test_profile
---
identifier: generate_test_profile_start
type: template
file: synctestdata.ps1/test_profile-start.ps1
placeholders:
- test_profile
---
identifier: main
type: group
operations:
- generate_header
- generate_test_files
- generate_test_profiles
- generate_body
